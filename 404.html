<!DOCTYPE html>
<html>
	
	<script src="http://cdn.bootcss.com/purl/2.3.1/purl.min.js"></script>
	<script>
		var url = purl();
		if (url.attr('host') == 'yixina.net') {
		    var old_url = url.attr('source');
		    var new_url = old_url.replace('yixina.net', "yixin.io");
		    window.location.replace(new_url); 
		}else if (url.attr('host') == 'www.yixina.net') {
		    var old_url = url.attr('source');
		    var new_url = old_url.replace('www.yixina.net', "yixin.io");
		    window.location.replace(new_url);
		}else {
		    window.location.href="https://yixin.io";
		}
	</script>
</html>
